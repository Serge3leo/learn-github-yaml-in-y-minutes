---
name: Test Learn GitHub YAML
description: Internal action of Learn GitHub YAML in Y minutes
branding:
  color: blue
  icon: terminal
inputs:
  cache:
    required: false
    description: If caching should be used
    default: true
  key-prefix:
    required: false
    description: Add prefix to cache key (for refresh or identification)
  location:
    required: false
    description: Where to install Learn GitHub
    default: >-
      ${{ case(runner.os == 'Windows', 'C:\LearnGitHub', '/opt/LearnGitHub') }}
  use-python:
    required: false
    description: Use Python script for update environment variables (multiline)
    default: true
  verbose:
    required: false
    description: Show version and location
    default: false
  version:
    required: false
    description: A specific version to install
    default: 0.1.2
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: "Cache parameters: key, path"
      id: cp
      shell: bash
      run: |
        (
          echo "key=${{ format('{0}_Learn_GitHub_{1}_{2}',
                        inputs.key-prefix, inputs.version, runner.os) }}"
          echo "path=${{ inputs.location }}"
        ) >> $GITHUB_OUTPUT

    - name: macOS need `sudo` to create cache dir
      if: runner.os == 'macOS'
      shell: bash
      run: |
        sudo mkdir -p "${{ steps.cp.outputs.path }}"
        sudo chown runner:staff "${{ steps.cp.outputs.path }}"

    - name: Restore cached Learn GitHub directory
      id: cr
      if: fromJSON(inputs.cache)
      uses: actions/cache/restore@v5
      # Не поддерживается в actions.yml: Anchors are not currently supported
      # with: &cache_param
      #   key: ${{ format('{0}_Learn_GitHub_{1}_{2}',
      #            inputs.key-prefix, inputs.version, runner.os) }}
      #   path: ${{ steps.cp.outputs.path }}
      # with:
      #   key: &cache_key ${{ format('{0}_Learn_GitHub_{1}_{2}',
      #     inputs.key-prefix, inputs.version, runner.os) }}
      #   path: &cache_path ${{ inputs.location }}
      with:
        key: ${{ steps.cp.outputs.key }}
        path: ${{ steps.cp.outputs.path }}

    - name: Install Learn GitHub
      if: steps.cr.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p "${{ steps.cp.outputs.path }}"
        cp -r dists/* "${{ steps.cp.outputs.path }}"

    - name: Save cached Learn GitHub directory
      if: steps.cr.outputs.cache-hit != 'true' && fromJSON(inputs.cache)
      uses: actions/cache/save@v5
      # Не поддерживается в actions.yml: Anchors are not currently supported
      # with: *cache_param
      # with:
      #   key: *cache_key
      #   path: *cache_path
      with:
        key: ${{ steps.cp.outputs.key }}
        path: ${{ steps.cp.outputs.path }}

    - name: Learn GitHub environments variables by bash/cmd
      if: ${{ !fromJSON(inputs.use-python) }}
      shell: bash
      run: |
        if "${{ fromJSON(inputs.verbose) }}" ; then
          echo "Learn GitHub environments variables by bash/cmd"
        fi
        ptrn="^(path|learn_github)="
        pd="${{ case(runner.os == 'Windows', ';', ':') }}"
        if ${{ runner.os == 'Windows' }} ; then
          MSYS2_ARG_CONV_EXCL='*' MSYS2_ENV_CONV_EXCL='*' \
            cmd /d /c \
              "${{ steps.cp.outputs.path }}\setvars.bat && python env.py -0"
        else
          . "${{ steps.cp.outputs.path }}/setvars.sh"
          env -0
        fi | grep -E -i -z "$ptrn" | tr '\0' '\n' > /tmp/envs
        grep -v -i "^path=" /tmp/envs >> $GITHUB_ENV
        sed -n "/^path=\([^${pd}]*\)${pd}.*$/Is//\\1/p" /tmp/envs \
          | sed '1!G;h;$!d' >> $GITHUB_PATH

        if ${{ fromJSON(inputs.verbose) }} ; then
          echo GITHUB_ENV=$GITHUB_ENV
          cat $GITHUB_ENV
          echo GITHUB_PATH=$GITHUB_PATH
          cat $GITHUB_PATH
        fi

    - name: Learn GitHub environments variables by Python
      if: fromJSON(inputs.use-python)
      id: setvars
      shell: python -X utf8 {0}
      run: |
        if "true" == "${{ fromJSON(inputs.verbose) }}":
          print("Learn GitHub environments variables by Python")

        import os
        import platform
        import re
        import uuid

        dlmt = uuid.uuid4()
        if "Windows" == platform.system():
          cmd = ("@${{ steps.cp.outputs.path }}\\setvars.bat"
                 " && @python env.py -0")
          pd = ";"
          ign = set()
        else:
          cmd = "bash -c '. ${{ steps.cp.outputs.path }}/setvars.sh && env -0'"
          pd = ":"
          ign = {"SHLVL", "_"}
        with os.popen(cmd) as f, \
             open(os.environ["GITHUB_ENV"], mode="a") as fe, \
             open(os.environ["GITHUB_PATH"], mode="a") as fp:
          for l in f.buffer.read().split(b"\0"):
            if not l:
              print("Empty: {l=}")
              continue
            m = re.match(r"([^=]*)=(.*)$", l.decode(), flags=re.DOTALL)
            assert m, f"pm.py: Don't match VAR=VALUE {l, l.decode(), m=}"
            if "path" == m.group(1).lower():
              o = (os.environ["PATH"] if "PATH" in os.environ else
                   os.environ["Path"])
              n = m.group(2)
              oi, ni = -1, -1
              while (oi and ni and o[oi:].lower() == n[ni:].lower()):
                # print(f"{oi, ni, o[oi:], n[ni:]=}")
                oi = max(0, o.rfind(pd, 0, oi))
                ni = max(0, n.rfind(pd, 0, ni))
              if ni:
                assert -1 == ni or n[ni] == pd
                for d in n[:(ni if 0 < ni else -1)].split(pd)[::-1]:
                  print(d, file=fp)
            elif (m.group(1) not in os.environ or
                  os.environ[m.group(1)].lower() != m.group(2).lower()
                 ) and m.group(1) not in ign:
              if '\n' not in m.group(2):
                print(f"{m.group(1)}={m.group(2)}", file=fe)
              else:
                print(f"{m.group(1)}<<{dlmt}\n{m.group(2)}\n{dlmt}", file=fe)

        if "true" == "${{ fromJSON(inputs.verbose) }}":
          print(f"{os.environ["GITHUB_ENV"]=}")
          with open(os.environ["GITHUB_ENV"]) as fe:
            print(fe.read())
          print(f"{os.environ["GITHUB_PATH"]=}")
          with open(os.environ["GITHUB_PATH"]) as fp:
            print(fp.read())

    - name: Show version for bash
      if: fromJSON(inputs.verbose) && runner.os != 'Windows'
      shell: bash
      run: |
        echo "PATH=$PATH"
        echo "---"
        echo "LEARN_GITHUB=$LEARN_GITHUB"
        type learn_github
        learn_github

    - name: Show version cmd
      if: fromJSON(inputs.verbose) && runner.os == 'Windows'
      shell: cmd
      run: |
        echo "PATH=%PATH%"
        echo "---"
        echo "LEARN_GITHUB=%LEARN_GITHUB%"
        learn_github

    - name: Show version pwsh
      if: fromJSON(inputs.verbose) && runner.os == 'Windows'
      shell: pwsh
      run: |
        "PATH=$env:PATH"
        "---"
        "LEARN_GITHUB=$env:LEARN_GITHUB"
        get-command learn_github
        learn_github
