name: Workflows Lessons by Learn YAML in Y minutes

on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  key: value
  another_key: Another value goes here.
  a_number_value: 100
  scientific_notation: 1e+12
  hex_notation: 0x123   # evaluates to 291
  octal_notation: 0123  # evaluates to 83

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: "darwin"
          - os: ubuntu-latest
            platform: "linux"
          - os: windows-latest
            platform: "win32"

    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          python -m pip install yamllint
          python -m yamllint --list-file .
          python -m yamllint .

      - shell: bash
        run: |
          echo "key=$key"
          echo "another_key=$another_key"
          echo "a_number_value=$a_number_value"
          echo "scientific_notation=$scientific_notation"
          echo "hex_notation=$hex_notation"
          echo "octal_notation=$octal_notation"

      - shell: pwsh
        run: |
          "key=$key"
          "another_key=$another_key"
          "a_number_value=$a_number_value"
          "scientific_notation=$scientific_notation"
          "hex_notation=$hex_notation"
          "octal_notation=$octal_notation"

      - if: ${{ matrix.platform == 'win32' }}
        shell: cmd
        run: |
          echo "key=%key%"
          echo "another_key=%another_key%"
          echo "a_number_value=%a_number_value%"
          echo "scientific_notation=%scientific_notation%"
          echo "hex_notation=%hex_notation%"
          echo "octal_notation=%octal_notation%"
